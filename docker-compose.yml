services:
  nanoaios:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanoaios
    restart: unless-stopped
    ports:
      - "4242:4242"
    env_file:
      - .env
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4242/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
